<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I ( ) you</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="stage">
    <div id="sentence">
      <span id="prefix"></span><span id="blank"></span><span id="suffix"></span>
      <span class="caret">|</span>
    </div>

    <div id="words">
      <span class="word" data-word="like">like</span>
      <span class="word" data-word="miss">miss</span>
      <span class="word" data-word="adore">adore</span>
      <span class="word" data-word="cherish">cherish</span>
      <span class="word" data-word="treasure">treasure</span>
      <span class="word" data-word="care">care</span>
      <span class="word" data-word="choose">choose</span>
      <span class="word" data-word="hold-dear">hold dear</span>
      <span class="word" data-word="long-for">long for</span>
      <span class="word" data-word="stay-with">stay with</span>
      <span class="word love" id="love" data-word="love">love</span>
    </div>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
